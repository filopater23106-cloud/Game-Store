<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Store | Login</title>

    <link rel="shortcut icon" href="./images/logo.ico" type="image/x-icon">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gradient-to-br from-gray-950 via-black to-gray-900 text-white font-sans">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-black/30 backdrop-blur-md border-b border-white/10 shadow-xl">
        <nav class="max-w-7xl mx-auto flex justify-center py-5">
            <a href="login.html">
                <img src="images/logo.jpg" alt="Game Store Logo" class="w-20 hover:scale-105 transition duration-300">
            </a>
        </nav>
    </header>

    <!-- Main -->
    <main class="min-h-screen flex items-center justify-center px-6 py-12">

        <form id = "log"class="w-full max-w-lg bg-gray-900/80 backdrop-blur-md border border-gray-700 rounded-2xl shadow-2xl p-8">

            <!-- Heading -->
            <div class="text-center mb-8">

                <h1 class="text-4xl text-red-600">
                    Welcome Back
                </h1>

                <p class="text-gray-400 mt-2">
                    Login to continue your gaming journey.
                </p>

            </div>

            <!-- Email -->
            <div class="emailDiv">

                <label for="email" class="block mb-2 text-gray-300">
                    Email Address
                </label>

                <div class="relative">

                    <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>

                    <input type="email" id="email" placeholder="example@email.com"
                        class="w-full pl-11 pr-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600 transition">

                </div>

                <div class="validation hidden mt-2">

                    <small class="block text-gray-400">
                        Email must contain '@' and '.'
                    </small>

                    <small class="text-red-500">
                        <i class="fa-regular fa-circle-xmark"></i>
                        Wrong Email
                    </small>

                </div>

            </div>

            <!-- Password -->
            <div class="passDiv mt-5">

                <label for="password" class="block mb-2 text-gray-300">
                    Password
                </label>

                <div class="relative">

                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>

                    <input type="password" id="password" placeholder="Enter your password"
                        class="w-full pl-11 pr-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-600 transition">

                </div>

                <div class="validation hidden mt-2">

                    <small class="block text-gray-400">
                        Password must be at least 8 characters.
                    </small>

                    <small class="text-red-500">
                        <i class="fa-regular fa-circle-xmark"></i>
                        Wrong Password
                    </small>

                </div>

            </div>

            <!-- Remember Me -->
            <div class="flex items-center justify-between mt-6">

                <label class="flex items-center gap-2 cursor-pointer">

                    <input id="check" type="checkbox" class="w-4 h-4 accent-red-600">

                    <span class="text-gray-300">
                        Remember Me
                    </span>

                </label>

                <a href="#" class="text-sm text-red-500 hover:text-red-400 transition">
                    Forgot Password?
                </a>

            </div>

            <!-- Login Button -->
            <button id="login" type="submit"
                class="w-full mt-8 bg-red-600 hover:bg-red-700 py-3 rounded-lg text-lg font-semibold transition-all duration-300">
                Login
            </button>

            <!-- Register -->
            <p class="text-center text-gray-400 mt-6">

                Don't have an account?

                <a href="register.html" class="text-red-500 hover:text-red-400 font-semibold transition">
                    Sign Up
                </a>

            </p>

        </form>

    </main>
    
    <script src="js/user.js"></script>

    <script src="js/login.js"></script>

</body>

</html>
