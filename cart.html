<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Store | Cart</title>

    <link rel="shortcut icon" href="./images/logo.ico" type="image/x-icon">

    <script src="https://cdn.tailwindcss.com"></script>


    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gradient-to-br from-gray-950 via-black to-gray-900 text-white font-sans">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-black/30 backdrop-blur-md border-b border-white/10 shadow-xl">
        <nav class="max-w-7xl mx-auto flex justify-center py-5">
            <a href="index.html">
                <img src="images/logo.jpg" alt="Game Store Logo" class="w-20 hover:scale-105 transition duration-300">
            </a>
        </nav>
    </header>

    <main class="bg-gray-950 min-h-screen">
        <div class="max-w-7xl mx-auto px-6  border-b-4 border-red-500">
            <h2 class="text-center text-6xl py-5 text-red-600">Cart Products</h2>
            <div class="w-full grid grid-cols-4 gap-5 py-5" id="cart_product">
            </div>

            <p id="total_price"
                class="text-2xl md:text-4xl font-black text-center py-6 md:py-10 text-yellow-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.3)]">


        </div>
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-center text-6xl py-5 text-red-600">Favorite Products</h2>

            <div class="w-full grid grid-cols-4 gap-5 py-5" id="favorite_products">

            </div>
        </div>
    </main>

    <script src="js/user.js"></script>

    <script src="js/cart.js"></script>

</body>

</html>
